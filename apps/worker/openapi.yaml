openapi: 3.1.0
info:
  title: Fluxychat Realtime API
  version: "1.0.0"
  description: |
    HTTP+WebSocket API for the Fluxychat real-time messaging platform.
    This spec focuses on the REST surface exposed by the Cloudflare Worker.
    Operational smoke checks against this contract: `scripts/smoke-test.sh` (see README `pnpm smoke:bundled`).

servers:
  - url: https://api.fluxychat.example.com
    description: Production
  - url: http://127.0.0.1:8787
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    fluxyApiKey:
      type: apiKey
      in: header
      name: X-Fluxy-Api-Key
      description: |
        Project API key (prefix `fc_...`). The worker also accepts the same value as query parameter `apiKey`.

  schemas:
    Message:
      type: object
      properties:
        id:
          type: integer
        roomId:
          type: string
        senderId:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        editedAt:
          type: string
          format: date-time
          nullable: true

    Reaction:
      type: object
      properties:
        messageId:
          type: integer
        roomId:
          type: string
        userId:
          type: string
        emoji:
          type: string
        op:
          type: string
          enum: [add, remove]

security:
  - bearerAuth: []

paths:
  /auth/token:
    post:
      summary: Mint a short-lived JWT
      description: |
        Server-side token minting for SDKs. Authenticates the project via API key (not Bearer JWT).
      security:
        - fluxyApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, roles]
              properties:
                userId:
                  type: string
                  description: Subject claim (`sub`); 1–128 chars, alphanumeric with `_` `-`.
                roles:
                  type: array
                  items:
                    type: string
                  description: JWT role claims (e.g. member, admin, owner).
                ttlSeconds:
                  type: integer
                  description: Token lifetime in seconds (clamped 60–86400; default 3600).
      responses:
        "200":
          description: Signed JWT and echo of claims
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expiresIn:
                    type: integer
                  claims:
                    type: object
        "400":
          description: Bad request (missing userId, invalid roles, or project secret not configured)
        "401":
          description: Missing or invalid API key

  /billing/checkout:
    post:
      summary: Create Stripe Checkout session
      description: |
        Returns a hosted Checkout URL when `STRIPE_SECRET_KEY` is configured; otherwise `501` with `billing_not_configured`.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                planName:
                  type: string
                  description: Target plan (e.g. starter, pro).
                successUrl:
                  type: string
                cancelUrl:
                  type: string
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                  sessionId:
                    type: string
        "401":
          description: Unauthorized
        "501":
          description: Stripe not configured on this deployment
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: billing_not_configured

  /billing/plan:
    get:
      summary: Current plan and monthly usage
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Plan row plus usage counters for current UTC month
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan:
                    type: object
                  usage:
                    type: object
                    additionalProperties:
                      type: integer
                  monthKey:
                    type: string
        "401":
          description: Unauthorized

  /billing/portal:
    post:
      summary: Stripe Customer Portal session
      description: Requires Stripe configuration; returns portal URL or error.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                returnUrl:
                  type: string
      responses:
        "200":
          description: Portal URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
        "401":
          description: Unauthorized
        "501":
          description: Stripe not configured

  /gdpr/delete:
    delete:
      summary: GDPR right to erasure
      description: Requires JWT with owner or admin role.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Erasure completed (may include partial_erasure warnings)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                  partial_erasure:
                    type: boolean
                  remaining_counts:
                    type: object
                    additionalProperties:
                      type: integer
        "401":
          description: Unauthorized
        "403":
          description: Caller is not owner/admin

  /gdpr/export:
    get:
      summary: GDPR data portability export
      description: Returns a JSON attachment with the authenticated user's data in the project.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: JSON export (attachment disposition)
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Unauthorized

  /health:
    get:
      summary: Health check
      description: No authentication. Reports D1/DO presence and optional KV/R2 degradation.
      security: []
      responses:
        "200":
          description: Critical dependencies OK (optional services may still be missing)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  ts:
                    type: integer
                  version:
                    type: string
                  checks:
                    type: object
                    additionalProperties:
                      type: string
                  degraded:
                    type: boolean
                  degradedFeatures:
                    type: object
                    additionalProperties:
                      type: string
        "503":
          description: Critical dependency missing (e.g. database)

  /messages:
    post:
      summary: Create message
      description: Create a new message in a room (JWT with `sub` and `tid` required).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roomId, content]
              properties:
                roomId:
                  type: string
                content:
                  type: string
                replyTo:
                  type: integer
                  nullable: true
      responses:
        "200":
          description: Created message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/Message"
        "400":
          description: Invalid roomId or content
        "401":
          description: Unauthorized
        "402":
          description: Monthly project quota exceeded (`quota_exceeded`)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: quota_exceeded
                  metric:
                    type: string
                  limit:
                    type: integer
                  used:
                    type: integer
                  month:
                    type: string
                  resetsAt:
                    type: string
                    format: date-time
                  retryAfterSeconds:
                    type: integer
        "429":
          description: Per-tenant/user/room rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: rate_limit_exceeded
                  retryAfterSeconds:
                    type: integer

  /messages/{id}:
    patch:
      summary: Edit message
      description: Edit an existing message (must be the original sender).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        "200":
          description: Edited message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    allOf:
                      - $ref: "#/components/schemas/Message"
                      - type: object
                        properties:
                          editedAt:
                            type: string
                            format: date-time
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      summary: Delete message
      description: Delete a message (must be the original sender).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "403":
          description: Forbidden
        "404":
          description: Not found

  /messages/{id}/reactions:
    post:
      summary: Add reaction
      description: Add an emoji reaction to a message.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji:
                  type: string
      responses:
        "200":
          description: Reaction added
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  reaction:
                    $ref: "#/components/schemas/Reaction"
        "404":
          description: Message not found
    delete:
      summary: Remove reaction
      description: Remove an emoji reaction from a message.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji:
                  type: string
      responses:
        "200":
          description: Reaction removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  reaction:
                    $ref: "#/components/schemas/Reaction"
        "404":
          description: Message not found

  /rooms/{id}/read:
    post:
      summary: Mark room read
      description: Record a read receipt up to a given message in a room.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messageId]
              properties:
                messageId:
                  type: integer
      responses:
        "200":
          description: Read receipt stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /reports:
    post:
      summary: Report message
      description: Create a moderation report for a specific message.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messageId, roomId]
              properties:
                messageId:
                  type: integer
                roomId:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Report accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Unauthorized

  /api/messages:
    get:
      summary: List messages
      description: Cursor-based history for a room. Requires member JWT with access to the room.
      security:
        - bearerAuth: []
      parameters:
        - name: roomId
          in: query
          required: true
          schema:
            type: string
        - name: before
          in: query
          required: false
          description: Return messages created before this ISO timestamp.
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"

  /rooms:
    get:
      summary: List rooms
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [dm, group, public]
        - name: userId
          in: query
          required: false
          description: If provided, includes `unreadCount` per room.
          schema:
            type: string
      responses:
        "200":
          description: Rooms
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        name:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        unreadCount:
                          type: integer
                          nullable: true
    post:
      summary: Create room
      description: Create a room (type dm/group/public); currently keyed by project API key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                id:
                  type: string
                name:
                  type: string
                type:
                  type: string
                  enum: [dm, group, public]
                members:
                  type: array
                  items:
                    type: object
                    properties:
                      userId:
                        type: string
                      role:
                        type: string
                        default: member
      responses:
        "200":
          description: Created room
          content:
            application/json:
              schema:
                type: object
                properties:
                  room:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      name:
                        type: string
                      created_at:
                        type: string
                        format: date-time

  /rooms/dm:
    post:
      summary: Ensure DM room
      description: Returns an existing DM room for the pair or creates one.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [a, b]
              properties:
                a:
                  type: string
                b:
                  type: string
      responses:
        "200":
          description: DM room
          content:
            application/json:
              schema:
                type: object
                properties:
                  room:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      name:
                        type: string
                      created_at:
                        type: string
                        format: date-time

  /rooms/{id}/unread:
    get:
      summary: Get unread count for room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  unreadCount:
                    type: integer

  /rooms/{id}/members:
    get:
      summary: List room members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Room members
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      type: object
                      properties:
                        userId:
                          type: string
                        role:
                          type: string
                        joined_at:
                          type: string
                          format: date-time

  /search/messages:
    get:
      summary: Search messages
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: roomId
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"

  /search/conversations:
    get:
      summary: Search conversations
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Matching rooms
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      type: object
                      properties:
                        room_id:
                          type: string
                        matches:
                          type: integer
                        lastMessage:
                          type: string
                          format: date-time

  /export/messages.json:
    get:
      summary: Export messages (JSON)
      parameters:
        - name: roomId
          in: query
          required: true
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: JSON export
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"

  /export/messages.csv:
    get:
      summary: Export messages (CSV)
      parameters:
        - name: roomId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CSV export
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /stats/rooms/{id}:
    get:
      summary: Room stats
      description: Message volume and active users for a room.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Room stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  roomId:
                    type: string
                  messageCount:
                    type: integer
                  activeUsers:
                    type: integer

  /stats/costs:
    get:
      summary: Cost estimates
      description: Rough cost projection based on total message count.
      responses:
        "200":
          description: Cost stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalMessages:
                    type: integer
                  pricing:
                    type: object
                    properties:
                      per1k:
                        type: number
                      per100k:
                        type: number
                      per1M:
                        type: number
                  note:
                    type: string

  /admin/mute:
    post:
      summary: Mute user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roomId, userId]
              properties:
                roomId:
                  type: string
                userId:
                  type: string
                durationSeconds:
                  type: integer
                reason:
                  type: string
      responses:
        "200":
          description: Muted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  expiresAt:
                    type: string
                    format: date-time
                    nullable: true

  /admin/ban:
    post:
      summary: Ban user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roomId, userId]
              properties:
                roomId:
                  type: string
                userId:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Banned
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /admin/unmute:
    post:
      summary: Unmute user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roomId, userId]
              properties:
                roomId:
                  type: string
                userId:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Unmuted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /admin/unban:
    post:
      summary: Unban user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roomId, userId]
              properties:
                roomId:
                  type: string
                userId:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Unbanned
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /admin/announcement:
    post:
      summary: Send system announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roomId, content]
              properties:
                roomId:
                  type: string
                content:
                  type: string
                userId:
                  type: string
                  description: Defaults to "system" if omitted.
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /automation/trigger:
    post:
      summary: Trigger automation event
      description: Generic automation hook (e.g. room_summary, dm_message).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType]
              properties:
                eventType:
                  type: string
                roomId:
                  type: string
                payload:
                  type: object
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /admin/projects:
    get:
      summary: List projects (internal/admin)
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        created_at:
                          type: string
                          format: date-time
    post:
      summary: Create project (internal/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Created project + API key
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      apiKey:
                        type: string

  /bots:
    post:
      summary: Create or update bot/agent
      description: >
        Registers a bot/agent for the authenticated project. Bots can be used
        by external services (e.g. AI agents) to post messages into rooms.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                id:
                  type: string
                  description: Optional stable identifier for the bot.
                name:
                  type: string
                webhookUrl:
                  type: string
                  description: Optional webhook URL to receive events out-of-band.
                handle:
                  type: string
                  description: >
                    Optional short handle used for mentions, e.g. "chatgpt" for @chatgpt.
                provider:
                  type: string
                  description: Optional provider identifier, e.g. "openai".
                model:
                  type: string
                  description: Optional model identifier, e.g. "gpt-4o".
                capabilities:
                  description: >
                    Optional list of capabilities, e.g. ["chat","suggest","image"].
                  oneOf:
                    - type: array
                      items:
                        type: string
                    - type: string
                config:
                  type: object
                  additionalProperties: true
                  description: Optional arbitrary configuration JSON.
      responses:
        "200":
          description: Bot/agent definition
          content:
            application/json:
              schema:
                type: object
                properties:
                  bot:
                    type: object
                    properties:
                      id:
                        type: string
                      projectId:
                        type: string
                      name:
                        type: string
                      webhookUrl:
                        type: string
                        nullable: true
                      handle:
                        type: string
                        nullable: true
                      provider:
                        type: string
                        nullable: true
                      model:
                        type: string
                        nullable: true
                      capabilities:
                        type: array
                        items:
                          type: string

  /rooms/{id}/messages/from-bot:
    post:
      summary: Post a message as a bot/agent
      description: >
        Injects a message into the given room authored by the specified bot.
        Useful for AI agents and automations.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [botId, content]
              properties:
                botId:
                  type: string
                  description: Bot/agent identifier as registered via /bots.
                content:
                  type: string
                replyTo:
                  type: integer
                  nullable: true
                  description: Optional parent message id for replies/threads.
      responses:
        "200":
          description: Created bot message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/Message"

