name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages for dashboard tests
        run: pnpm --filter @fluxy-chat/sdk build

      - name: Test
        run: pnpm test

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: apps/dashboard
        run: pnpm exec playwright install --with-deps chromium

      - name: Onboarding smoke (Playwright)
        working-directory: apps/dashboard
        env:
          CI: "true"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ""
          CLERK_SECRET_KEY: ""
          NEXT_PUBLIC_FLUXYCHAT_WORKER_URL: http://127.0.0.1:8787
        run: pnpm test:e2e:smoke

  # Manual only: needs wrangler .dev.vars + E2E_ADMIN_JWT (see apps/dashboard/playwright.integrated.config.ts).
  e2e-integrated:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: apps/dashboard
        run: pnpm exec playwright install --with-deps chromium

      - name: Onboarding integrated (worker + dashboard)
        working-directory: apps/dashboard
        env:
          CI: "true"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ""
          CLERK_SECRET_KEY: ""
          NEXT_PUBLIC_FLUXYCHAT_WORKER_URL: http://127.0.0.1:8787
          E2E_ADMIN_JWT: ${{ secrets.E2E_ADMIN_JWT }}
        run: pnpm test:e2e:integrated
